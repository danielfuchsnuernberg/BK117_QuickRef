re"},{k:"sub",t:"Both caution lights on:"},{k:"land",level:"possible"},{k:"plain",t:"Be prepared for double engine failure"}]},{id:"ground-power-check",cat:"powerchecks",group:"Power Assurance",title:"Ground Power Check (TOT)",ref:{src:"FM",loc:"\xA75.6.3 \xB7 Fig 5-1 \xB7 p. 5-3\u20265-6",rev:"8"},kind:"procedure",indications:["Single-engine check (other engine at ground idle). Verifies engine power is within the limits for legal use of the Section 5 performance charts."],preconditions:["Adequate distance from buildings, trees, etc. (reduce wind vortices)","Helicopter heading into wind","CSAS or DAFCS yaw axis stabilization \u2014 ON","Bleed air heating (of engine to be checked) \u2014 OFF","Other bleed air consumers \u2014 OFF","Generator (of engine to be checked) \u2014 OFF","Rotor RPM \u2014 100%"],blocks:[{k:"step",a:"Barometric altimeter",i:"Set 1013.2 hPa (before start)"},{k:"step",a:"Pressure altitude",i:"Check"},{k:"sub",t:"After starting engines:"},{k:"step",a:"Calibrated OAT",i:"Check once stabilized"},{k:"step",a:"Non-affected engine",i:"Set to ground idle"},{k:"step",a:"Collective pitch",i:"Increase slowly to \u2265 70% torque at 100% rotor RPM"},{k:"note",t:"If 70% torque is not achievable without exceeding the TOT limit, stabilize at a lower torque but keep TOT above 750 \xB0C \u2014 otherwise the result is not reliable."},{k:"step",a:"Engine",i:"Stabilize at established power \u2265 3 minutes"},{k:"step",a:"Record (avoid parallax)",i:"Torque (%), TOT (\xB0C) \u2014 repeat for other engine"},{k:"step",a:"Chart limit TOT",i:"Obtain from Fig 5-1 (torque, PA, OAT)"},{k:"step",a:"\u0394TOT",i:"Chart limit TOT \u2212 measured TOT"},{k:"note",t:"Acceptable when measured TOT \u2264 chart limit TOT. If greater, repeat with 10% higher torque (if possible). If still failing in low/no wind, repeat in a hover with enough height."},{k:"warn",t:"When performing the power check at a hover and the online engine fails, both engines are considered inoperative \u2014 an ,["16000",92,100,103,100,95,90,90,90,null,null,null],["18000",88,95,95,90,90,90,90,null,null,null,null]]},{h:"All effectivities \xB7 takeoff gross mass > 3000 kg",pa:[["0",125,135,139,140,140,140,140,140,140,140,135],["2000",121,130,134,140,140,140,140,140,135,130,125],["4000",117,125,129,137,140,140,135,130,125,120,115],["6000",112,120,125,132,135,130,125,120,115,110,null],["8000",108,116,120,127,125,120,115,110,105,100,null],["10000",104,112,115,120,115,110,105,100,95,null,null],["12000",100,107,111,null,null,null,null,null,null,null,null]]}],notes:["Values in KIAS (IAS). If SPAS is not in operation, VNE is reduced by 15 kt.","Use the table for your aircraft's effectivity (serial number / S/B-MBB-BK117-60-111 status). Rows 0\u201314000 ft are identical across both effectivities; the > 3000 kg table is the same for both.","Blank cells (\xB7) are outside the published envelope \u2014 no extrapolation."]},{id:"asi-markings",cat:"limits",group:"Airspeed",title:"Airspeed Indicator Markings",ref:{src:"TM",loc:"Instruments \xB7 Fig 25a"},kind:"keyvalue",pairs:[{k:"Green arc (normal range)",v:"30 \u2013 150 kt",c:"green"},{k:"Yellow arc (caution)",v:"10 \u2013 30 kt",c:"amber"},{k:"Red cross-hatched radial (max autorotation)",v:"90 kt",c:"red"},{k:"Red radial",v:"VNE (never-exceed)",c:"red"}]},{id:"alt-temp-limits",cat:"limits",group:"Altitude & Environment",title:"Altitude & Temperature Limits",ref:{src:"FM",loc:"\xA72.9 / \xA72.10 \xB7 Fig 2-3 \xB7 p. 2-6\u20262-8",rev:"6"},kind:"keyvalue",pairs:[{head:"Max operating altitude \u2014 up to S/N 7252 (before S/B-MBB-BK117-60-111)"},{k:"Gross mass \u2264 3000 kg",v:"15 000 ft"},{k:"Gross mass > 3000 kg",v:"10 000 ft  (12 000 ft if OAT < \u221230 \xB0C)"},{k:"HIGE, takeoff & landing",v:"17 000 ft DA or 15 000 ft PA \u2014 whichever is less"},{head:"Max operating altitude \u2014 S/N 7253 & subsequent (or after S/B-MBB-BK117-60-111)"},{k:"Gross mass \u2264 3000 kg",v:"18 000 ft"},{k:"Gross mass > 3000 kg",v:"10 000 ft  (12 000 ft if OAT < \u221230 \xB0C)"},{k:"HIGE, takeoff & landing",v:"17 000 ft DA or 18 000 ft PA \u2014 whichever is less"},{head:"All effectivities"},{k:"French-registered, JP-4 fuel",v:"7 000 ft"},{k:"Minimum air temperature",v:"\u221245 \xB0C"},{k:"Maximum air temperature",v:"ISA + 35 \xB0C (max +50 \xB0C)"}],notes:["All altitudes are pressure altitude (PA) unless given as density altitude (DA).","Full envelope (varies with OAT & gross mass): Fig 2-3, p. 2-7. The high-altitude (hatched) area is permitted only with the High Altitude Kit (S/N 7253 & subsequent, or S/B-MBB-BK117-60-111 incorporated).","Pitot and static port heating ON when ambient temperature is below +4.5 \xB0C and visible moisture is present.","Flight into icing conditions is prohibited; if entered unexpectedly, leave the icing zone the quickest possible way.","\u2197 Chart Analyst (Suite \xB7 \xA75): these altitude limits bound the \xA75 performance lookups (hover ceiling, height-velocity, power check). Confirm the planned altitude is within them before using the charts."]},{id:"wind-limits",cat:"limits",group:"Airspeed",title:"Sideward, Rearward & Crosswind Limits",ref:{src:"FM",loc:"\xA72.8.2 / \xA72.8.3 \xB7 p. 2-6",rev:"6"},kind:"keyvalue",pairs:[{head:"Sideward / rearward flight (demonstrated)"},{k:"DA \u2264 3000 ft",v:"up to 30 kt"},{k:"DA > 3000 ft",v:"up to 20 kt"},{head:"Crosswind \u2014 standard takeoff & landing (demonstrated)"},{k:"Crosswind component",v:"up to 17 kt"}],notes:["Sideward / crosswind-hover and rearward / tailwind-hover demonstrated to these speeds, by density altitude (DA).","17 kt is the demonstrated directional-controllability crosswind limit for standard takeoff and landing \u2014 see the Wind Component Chart (Section 1).","External-load operations have their own, more restrictive sideward limits \u2014 see the External Cargo Hook entry."]},{id:"ech-limits",cat:"supplements",group:"External Cargo Hook \xB7 FMS 10-2",title:"External Cargo Hook \u2014 Limits & Weights",ref:{src:"FM",loc:"FMS 10-2 \xA72 \xB7 p. 10-2-3\u20262-5",rev:"8"},kind:"keyvalue",pairs:[{k:"Max cargo hook load \u2014 assy 117-80101",v:"1200 kg"},{k:"Max cargo hook load \u2014 assy 117-80112",v:"1500 kg"},{k:"Max combined gross mass (helicopter + load)",v:"3500 kg"},{k:"Max airspeed \u2014 with external load",v:"100 kt"},{k:"Max airspeed \u2014 trailing unloaded hook",v:"70 kt"},{k:"Max demonstrated bank angle",v:"45\xB0"},{k:"Sideward flight \u2014 right / left / rearward",v:"10 / 20 / 20 kt"},{k:"Point of load application (aft of datum)",v:"4385 mm"},{k:"Cargo hook assy mass",v:"14.32 kg"}],notes:["VFR \u201CClass B rotorcraft/load combination\u201D: the external load is jettisonable and is lifted free of land or water.","Attach the load only with a fixed ring of inner diameter 50\u201380 mm.","Flight with an empty net or unballasted sling is prohibited unless the operator's approved limits/procedures allow it.","Keep the distance between load and hook as short as possible. HOGE operations with external cargo should be flown heading into wind.","ECD strongly recommends restricting cargo-hook operations with persons to emergency situations only."]},{id:"ech-emergency",cat:"supplements",group:"External Cargo Hook \xB7 FMS 10-2",title:"Cargo Hook \u2014 Engine Failure / Load Jettison",ref:{src:"FM",loc:"FMS 10-2 \xA73 / \xA74 \xB7 p. 10-2-6\u20262-8",rev:"8"},kind:"procedure",lamps:[{caption:"HOOK",type:"caution"}],indications:["One engine fails while carrying an external load, or the load must be released in an emergency."],blocks:[{k:"note",t:"If one engine fails, the external load may have to be dumped. Refer to the single-engine performance diagrams, Section 5 of the basic Flight Manual."},{k:"phase",t:"Electrical Release (Normal)"},{k:"step",a:"Safety cover (CARGO HOOK REL. switch)",i:"Open"},{k:"step",a:"CARGO HOOK REL. switch (collective)",i:"Push forward \u2014 load releases when its mass overcomes the hook spring force"},{k:"warn",t:"Illumination of the HOOK caution light does not safely indicate that the cargo sling is detached from the hook."},{k:"phase",t:"Electrical Release Failure"},{k:"step",a:"Mechanical emergency release (foot-operated, RH door frame)",i:"Operate to release the load"}],notes:["HOOK caution light: illuminates while the cargo hook trails and no force greater than 50 N (5 kg) acts on the hook. The maximum trailing-unloaded airspeed of 70 kt must not be exceeded.","Opening the hook requires overcoming a spring force of approx. 50 N (5 kg); this force re-closes and locks the hook automatically."]},{id:"lrft-numbers",cat:"supplements",group:"Long Range Fuel Tank \xB7 FMS 10-3",title:"Long Range Fuel Tank \u2014 Numbers & Weights",ref:{src:"FM",loc:"FMS 10-3 \xA72 \xB7 p. 10-3-2\u20263-6",rev:"8"},kind:"keyvalue",pairs:[{k:"Usable fuel \u2014 per tank",v:"159.0 kg \xB7 198.8 l"},{k:"Unusable fuel \u2014 per tank (cruise)",v:"1.0 kg \xB7 1.2 l"},{k:"Total capacity \u2014 per tank",v:"160.0 kg \xB7 200.0 l"},{k:"Capacity (US)",v:"52.8 US gal"},{k:"Fuel density basis",v:"0.8 kg/l"},{k:"Tank mass (empty, detachable portion)",v:"\u2248 23 \u2013 28.5 kg"}],notes:["Fuel transfer into the main tank is by gravity. Quantity is read on the main-tank indicator via the FUEL QTY-IND switch (LR TK-L / LR TK-R).","At low airspeed and/or extreme aft CG, unusable fuel rises to max 13.82 l (11.06 kg) per tank.","P/N 117-804381: two tanks may NOT be installed simultaneously. P/N 117-804401: two tanks permitted only when both are fixed in the most forward position. CG limits remain unchanged.","System switches LR FUEL TK L / R have positions EMER OP \xB7 OP \xB7 CL."]},{id:"lrft-emergency",cat:"supplements",group:"Long Range Fuel Tank \xB7 FMS 10-3",title:"Long Range Fuel Tank \u2014 Emergency / Malfunction",ref:{src:"FM",loc:"FMS 10-3 \xA73 \xB7 p. 10-3-3",rev:"8"},kind:"procedure",indications:["MN TK FREE indication does not come on although less than 200 kg is shown on the MN TANK FUEL QTY indicator, or an emergency landing is impending."],blocks:[{k:"phase",t:"MN TK FREE Indication Failure"},{k:"step",a:"Respective LR FUEL TK switch",i:"EMER OP (overrides the lock; valve opens immediately)"},{k:"phase",t:"Emergency Landing"},{k:"step",a:"Fuel",i:"Transfer as much as possible into the main tank"},{k:"warn",t:"In case of an emergency landing, set the respective LR FUEL TK switch to CL (close) prior to touchdown."}]},{id:"csas3-numbers",cat:"supplements",group:"3-Axis CSAS \xB7 FMS 10-32",title:"3-Axis CSAS \u2014 Numbers & Notes",ref:{src:"FM",loc:"FMS 10-32 \xB7 p. 10-32-1\u202632-7",rev:"1"},kind:"keyvalue",pairs:[{k:"System mass",v:"23.72 kg"},{k:"Arm (aft of datum)",v:"5100 mm"},{k:"Actuator authority (each axis)",v:"\xB1 5%"},{k:"Part number",v:"117-88602 / 117-872701"}],notes:["Augments pitch, roll and yaw via the flight-control servo actuators; two independent subsystems (pitch/roll and yaw) on a common control panel.","All CSAS axes can be switched off simultaneously by the STABILIZATION CUTOFF pushbutton on the cyclic stick grip.","CG and limitations not contained in the supplement remain per the basic Flight Manual."]},{id:"csas3-pitchroll",cat:"supplements",group:"3-Axis CSAS \xB7 FMS 10-32",title:"3-Axis CSAS \u2014 PITCH / ROLL Caution",ref:{src:"FM",loc:"FMS 10-32 \xA73.1.1 \xB7 p. 10-32-2",rev:"1"},kind:"procedure",lamps:[{caption:"CSAS PITCH",type:"caution"},{caption:"CSAS ROLL",type:"caution"}],indications:["Malfunction of the respective CSAS axis","Change in respective axis control behavior"],blocks:[{k:"step",a:"Affected axis switch",i:"OFF"},{k:"note",t:"A pitch/roll axis failure might indicate a copilot's artificial-horizon malfunction. Check for the absence of a warning flag."}]},{id:"csas3-yaw",cat:"supplements",group:"3-Axis CSAS \xB7 FMS 10-32",title:"3-Axis CSAS \u2014 YAW Caution",ref:{src:"FM",loc:"FMS 10-32 \xA73.1 \xB7 p. 10-32-3",rev:"1"},kind:"procedure",lamps:[{caption:"CSAS YAW",type:"caution"}],indications:["Malfunction of the yaw axis","Change in yaw control behavior"],blocks:[{k:"warn",t:"Avoid hard and abrupt left/right pedal movements after pressing the STABILIZATION CUTOFF pushbutton."},{k:"note",t:"A yaw axis failure might indicate a pilot's artificial-horizon malfunction. Check for the absence of a warning flag."},{k:"step",a:"STABILIZATION CUTOFF pushbutton",i:"Press"},{k:"step",a:"PITCH and ROLL switches",i:"OFF, then ON"}]},{id:"csas3-runaway",cat:"supplements",group:"3-Axis CSAS \xB7 FMS 10-32",title:"3-Axis CSAS \u2014 Pitch/Roll Actuator Runaway",ref:{src:"FM",loc:"FMS 10-32 \xA73.2.1 \xB7 p. 10-32-3",rev:"1"},kind:"procedure",indications:["Sudden attitude change","Affected axis caution light comes on"],blocks:[{k:"note",t:"When operating near the ground, remain attentive \u2014 an actuator runaway could result in a loss of altitude."},{k:"step",a:"STABILIZATION CUTOFF pushbutton",i:"Press"},{k:"step",a:"Non-affected axes",i:"Reengage"},{k:"note",t:"The helicopter may yaw slightly when reengaging the yaw CSAS."}]},{id:"csasyaw-numbers",cat:"supplements",group:"Yaw CSAS \xB7 FMS 10-41",title:"Yaw CSAS \u2014 Notes",ref:{src:"FM",loc:"FMS 10-41 \xB7 p. 10-41-1",rev:"0"},kind:"keyvalue",pairs:[{k:"Part number",v:"117-88610"},{k:"Hydraulic supply",v:"System II"}],notes:["Improves control and dynamic stability around the yaw axis; eases directional control and reduces the effect of turbulence.","The Yaw CSAS can be switched off via the STABILIZATION CUTOFF pushbutton on the cyclic stick grip.","If hydraulic system I fails and an automatic changeover to system II occurs, the hydraulic supply to the yaw actuator is cut off and the Yaw CSAS becomes inoperative.","CG and limitations not contained in the supplement remain per the basic Flight Manual."]},{id:"csasyaw-caution",cat:"supplements",group:"Yaw CSAS \xB7 FMS 10-41",title:"Yaw CSAS \u2014 CSAS YAW Caution",ref:{src:"FM",loc:"FMS 10-41 \xA73.1.1 \xB7 p. 10-41-2",rev:"0"},kind:"procedure",lamps:[{caption:"CSAS YAW",type:"caution"}],indications: ward flight."},{h:"Category A Landing",p:"Operation such that, if one engine fails after the start of the approach, the helicopter can \u2014 prior to LDP \u2014 climb out and attain single-engine forward flight (or continue and land/stop), or \u2014 after LDP \u2014 continue the approach and safely land/stop."},{h:"Takeoff Decision Point (TDP)",p:"The point on the takeoff path at which the pilot decides whether to reject (before TDP) or continue (after TDP) the takeoff following an engine failure."},{h:"Landing Decision Point (LDP)",p:"The last point on the landing profile at which the height/airspeed combination permits the decision to continue the landing or to accelerate to VTOSS and climb away."},{h:"Takeoff Safety Speed (VTOSS)",p:"The airspeed assuring a steady climb of at least 100 fpm with 2.5-min power (OEI) at the max gross mass for the ambient condition. VTOSS = 50 KIAS."},{h:"Best Rate-of-climb Speed (VY)",p:"The airspeed giving the greatest gain in altitude in a given time. VY = 65 KIAS."}]},{id:"wl-xmsn-oil-press",cat:"emergencies",group:"Warning Lights",title:"XMSN OIL PRESS",ref:{src:"FM",loc:"\xA73.2.1 \xB7 p. 3-8",rev:"5A"},kind:"procedure",lamps:[{caption:"XMSN OIL PRESS",type:"warning"}],indications:["Transmission oil pressure below minimum","\u2013 Transmission oil pressure indication 1 bar or less"],blocks:[{k:"note",t:"XMSN OIL PRESS warning light may come on momentarily during extreme side slip, sidewards flight, crosswind hover or slope operations."},{k:"sub",t:"If one XMSN oil pressure indication is below minimum:"},{k:"step",a:"Power",i:"Reduce"},{k:"land",level:"practicable"},{k:"sub",t:"If both indications are below 1 bar:"},{k:"land",level:"immediately"},{k:"note",t:"Descend with minimum power."}]},{id:"wl-rotor-rpm",cat:"emergencies",group:"Warning Lights",title:"ROTOR RPM",ref:{src:"FM",loc:"\xA73.2.1 \xB7 p. 3-7",rev:"5A"},kind:"procedure",lamps:[{caption:"ROTOR RPM",type:"warning"}],indications:["NRo low \u2014 NRo 95% or less \u2014 Audio signal: steady tone","NRo high \u2014 NRo 106% or more \u2014 Audio signal: none"],blocks:[{k:"step",a:"Collective lever",i:"Adjust as necessary to maintain NRo within normal operating range"}]},{id:"wl-bat-disch",cat:"emergencies",group:"Warning Lights",title:"BAT DISCH",ref:{src:"FM",loc:"\xA73.2.1 \xB7 p. 3-4",rev:"5A"},kind:"procedure",lamps:[{caption:"BAT DISCH",type:"warning"}],indications:["DC power is supplied by battery"],blocks:[{k:"step",a:"AMM SEL switch",i:"BAT"},{k:"step",a:"Ammeter and voltmeter",i:"Monitor"},{k:"step",a:"Electrical consumption",i:"Reduce to save battery power"},{k:"land",level:"practicable"},{k:"note",t:"See also Electrical Short Circuit \u2014 Battery Bus / Feeder Line (p. 3-62)."}]},{id:"wl-bat70",cat:"emergencies",group:"Warning Lights",title:"BAT 70",ref:{src:"FM",loc:"\xA73.2.1 \xB7 p. 3-5",rev:"5A"},kind:"procedure",lamps:[{caption:"BAT 70",type:"warning"}],indications:["Battery overtemperature (above 70 \xB0C)"],blocks:[{k:"phase",t:"On Ground"},{k:"step",a:"MASTER PWR switch (or PWR SELECT)",i:"OFF \u2014 on later effectivities the BAT OFF caution light comes on"},{k:"step",a:"Engines",i:"Shut down"},{k:"caution",t:"Battery must be inspected or replaced prior to next flight."},{k:"phase",t:"Inflight"},{k:"step",a:"PWR SELECT switch",i:"OFF \u2014 on later effectivities the BAT OFF caution light comes on"},{k:"land",level:"possible"},{k:"sub",t:"After landing:"},{k:"step",a:"Engines",i:"Leave running in IDLE"},{k:"step",a:"Collective lever and cyclic stick",i:"Lock"},{k:"note",t:"Continue flight only if visual inspection reveals no indication of battery overheating. Leave battery off or disconnect battery."},{k:"caution",t:"Battery must be inspected or replaced at destination prior to next flight."}]},{id:"wl-limit",cat:"emergencies",group:"Warning Lights",title:"Mast Moment Indicator",ref:{src:"FM",loc:"\xA73.2.1 \xB7 p. 3-11",rev:"5A"},kind:"procedure",lamps:[{caption:"LIMIT",type:"warning",shape:"round"}],indicatio
